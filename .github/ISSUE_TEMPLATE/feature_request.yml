name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your feature suggestions! Please describe your use case so we can prioritize effectively.

  - type: input
    id: license
    attributes:
      label: License Tier
      placeholder: "Standard / Professional / Enterprise"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see?
      placeholder: Describe the feature and how it would help your use case
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: If you have a preferred API design, share it here
      render: javascript

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to your project?
      options:
        - Nice to have
        - Important — affects my workflow
        - Critical — blocking my project
    validations:
      required: true
