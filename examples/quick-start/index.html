<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRD Chart Engine — Quick Start Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0e14;
      color: #e8eaed;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: #131820;
      border-bottom: 1px solid #1e2536;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .title { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .symbol-info { font-size: 13px; color: #8b92a5; }
    .symbol-info .price { color: #00c9a7; font-weight: 600; margin-left: 8px; }
    .symbol-info .change { font-size: 12px; margin-left: 6px; }
    .symbol-info .change.up { color: #00c9a7; }
    .symbol-info .change.down { color: #ff4757; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 20px;
      background: #131820;
      border-bottom: 1px solid #1e2536;
      flex-wrap: wrap;
    }
    .toolbar-sep { width: 1px; height: 24px; background: #1e2536; margin: 0 8px; }
    .toolbar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: #5c6370; text-transform: uppercase; margin-right: 4px; }
    .tb {
      padding: 4px 10px;
      background: transparent;
      color: #8b92a5;
      border: 1px solid transparent;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      font-family: inherit;
    }
    .tb:hover { background: #1a1f2e; color: #e8eaed; }
    .tb.active { background: #0a7cff; color: white; }
    .tb.on { background: #1a1f2e; color: #0a7cff; border-color: rgba(10,124,255,0.3); }

    /* ── Chart area ── */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: calc(100vh - 48px - 38px - 32px);
    }
    .chart-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: #0b0e14;
      z-index: 10;
      transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #1e2536;
      border-top-color: #0a7cff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; color: #5c6370; }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 32px;
      background: #131820;
      border-top: 1px solid #1e2536;
      font-size: 11px;
      color: #5c6370;
    }
    .footer a { color: #0a7cff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Light theme ── */
    body.light { background: #ffffff; color: #1a1a2e; }
    body.light .header,
    body.light .toolbar,
    body.light .footer { background: #f8f9fb; border-color: #e5e7eb; }
    body.light .tb { color: #6b7280; }
    body.light .tb:hover { background: #f0f1f5; color: #1a1a2e; }
    body.light .tb.on { background: #eef4ff; color: #0a7cff; }
    body.light .toolbar-sep { background: #e5e7eb; }
    body.light .toolbar-label { color: #9ca3af; }
    body.light .loading { background: #ffffff; }
    body.light .footer { color: #9ca3af; }
    body.light .symbol-info { color: #6b7280; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="title">MRD Chart Engine — Demo</span>
      <span class="symbol-info">
        <span id="symbol">BTCUSDT</span>
        <span class="price" id="last-price">--</span>
        <span class="change up" id="price-change">--</span>
      </span>
    </div>
    <div style="font-size: 12px; color: #5c6370;">
      <a href="https://app.mrd-indicators.com/trading/chart-terminal" target="_blank" style="color: #0a7cff; text-decoration: none;">
        See full live demo &rarr;
      </a>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-label">Pair</span>
    <button class="tb active" data-sym="BTCUSDT" data-price="68500">BTC/USDT</button>
    <button class="tb" data-sym="ETHUSDT" data-price="3420">ETH/USDT</button>
    <button class="tb" data-sym="SOLUSDT" data-price="148">SOL/USDT</button>

    <div class="toolbar-sep"></div>
    <span class="toolbar-label">TF</span>
    <button class="tb" data-tf="60">1m</button>
    <button class="tb active" data-tf="300">5m</button>
    <button class="tb" data-tf="900">15m</button>
    <button class="tb" data-tf="3600">1H</button>
    <button class="tb" data-tf="14400">4H</button>

    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Indicators</span>
    <button class="tb on" id="tog-vol">Volume</button>
    <button class="tb" id="tog-rsi">RSI</button>
    <button class="tb" id="tog-oi">OI</button>
    <button class="tb" id="tog-fp">Footprint</button>
    <button class="tb" id="tog-hm">Heatmap</button>
    <button class="tb" id="tog-delta-hist">Delta Hist</button>

    <div class="toolbar-sep"></div>
    <span class="toolbar-label">FP Mode</span>
    <button class="tb active" id="fp-mode-bidask">Bid×Ask</button>
    <button class="tb" id="fp-mode-delta">Delta</button>
    <button class="tb" id="fp-mode-vol">Volume</button>

    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Draw</span>
    <button class="tb" data-draw="trendline">Trend</button>
    <button class="tb" data-draw="fibonacci">Fib</button>
    <button class="tb" data-draw="channel">Channel</button>

    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Theme</span>
    <button class="tb active" id="btn-dark">Dark</button>
    <button class="tb" id="btn-light">Light</button>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading chart engine…</p>
    </div>
    <canvas id="chart"></canvas>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>MRD Chart Engine v0.1.0 — <a href="https://github.com/PhamNhinh/kline-orderbook-chart#documentation" target="_blank">Documentation</a></span>
    <span>Live demo: <a href="https://app.mrd-indicators.com/trading/chart-terminal" target="_blank">app.mrd-indicators.com</a></span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
